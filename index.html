<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVibe - Sua Vibe de Cinema</title>
    
    <!-- Importando fontes modernas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta de Cores Gamer/Roxo Moderno */
            --bg-dark: #0f0f13;
            --bg-card: #1a1a24;
            --primary: #8a2be2; /* Roxo Gamer */
            --primary-glow: #9d4edd;
            --accent: #00e5ff; /* Ciano para contraste neon */
            --text-main: #ffffff;
            --text-secondary: #b3b3b3;
            --rating-high: #00ff88;
            --rating-mid: #ffcc00;
            --rating-low: #ff4d4d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Header & Navegação --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(15, 15, 19, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(138, 43, 226, 0.3);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary);
            cursor: pointer;
        }

        .logo span {
            color: var(--primary);
        }

        nav ul {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
            position: relative;
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
            text-shadow: 0 0 8px var(--primary);
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--primary);
            transition: width 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* --- Barra de Pesquisa --- */
        .search-container {
            position: relative;
            width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 25px;
            border: 2px solid #333;
            background: var(--bg-card);
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }

        /* --- Hero Banner --- */
         .hero {
    height: 80vh;
    background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
    url("https://images6.alphacoders.com/119/1191374.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    align-items: center;
    padding: 50px;
}        /* Overlay escuro roxo */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(15,15,19,0.95) 0%, rgba(15,15,19,0.7) 50%, rgba(15,15,19,0.1) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            animation: slideUp 1s ease-out;
        }

        .hero-tag {
            background-color: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 15px;
            box-shadow: 0 0 10px var(--primary);
        }

        .hero-title {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #b3b3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-watch {
            padding: 12px 35px;
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--primary);
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-watch:hover {
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            transform: scale(1.05);
        }

        /* --- Conteúdo Principal (Grid de Filmes) --- */
        main {
            padding: 50px 5%;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        /* --- Card do Filme com Efeito --- */
        .movie-card {
            background: var(--bg-card);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .movie-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.3);
            border-color: var(--primary);
            z-index: 10;
        }

        .card-image-wrapper {
            position: relative;
            width: 100%;
            height: 350px;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .movie-card:hover .card-image {
            transform: scale(1.1);
        }

        /* Nota flutuante */
        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: var(--text-main);
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .rating-badge.good { color: var(--rating-high); border-color: var(--rating-high); }
        .rating-badge.avg { color: var(--rating-mid); border-color: var(--rating-mid); }
        .rating-badge.bad { color: var(--rating-low); border-color: var(--rating-low); }

        .card-content {
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 600;
        }

        /* Efeito de brilho ao passar o mouse */
        .movie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
            z-index: 1;
        }

        .movie-card:hover::before {
            left: 100%;
        }

        /* --- Footer --- */
        footer {
            background-color: #050507;
            padding: 40px 5%;
            text-align: center;
            border-top: 1px solid #222;
        }

        footer p {
            color: var(--text-secondary);
            margin-top: 10px;
        }

        /* Animações */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden {
            display: none;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            
            nav ul {
                gap: 15px;
                font-size: 0.9rem;
            }

            .hero-title {
                font-size: 2.5rem;
            }
            
            .search-container {
                width: 100%;
            }
        }

        .modal {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    overflow-y: auto;
}

.modal-content {

}

.modal-img {

}

.close {

}

.movie-card:hover {

}

}

    box-shadow: 0 0 40px rgba(138,43,226,0.9);
}

.modal-img {
    width: 100%;
    height: 380px;
    object-fit: cover;
    border-radius: 0;
}

#modalTitle {
    font-size: 2.5rem;
    margin: 20px;
}

#modalDesc, #modalInfo {
    margin: 0 20px 15px;
    color: #ddd;
    font-size: 1.1rem;
}

.modal-content .btn-watch {
    margin: 20px;
    background: #8a2be2;
    color: white;
    border: none;
}

#modalTrailer {
    padding: 20px;
}

#modalTrailer iframe,
#modalTrailer video {
    border-radius: 18px;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
}

    cursor: pointer;
    transition: 0.3s;
}

    background: #9d4edd;

}

    cursor: pointer;
    transition: 0.3s;
}

    background: #9d4edd;
    transform: scale(1.05);
}

.whatsapp-btn {
    position: fixed;
    right: 25px;
    bottom: 25px;
    width: 60px;
    height: 60px;
    background: #25d366;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 30px;
    z-index: 99999;
    box-shadow: 0 0 20px rgba(37, 211, 102, 0.7);
    transition: 0.3s;
}

.whatsapp-btn:hover {
    transform: scale(1.1);
}
    </style>
</head>
<body>

    <!-- Cabeçalho -->
    <header>
        <div class="logo">Cine<span>Vibe</span></div>
        <nav>
            <ul>
                <li><a href="#" class="active" onclick="filterCategory('all')">Início</a></li>
                <li><a href="#" onclick="filterCategory('movie')">Filmes</a></li>
                <li><a href="#" onclick="filterCategory('series')">Séries</a></li>
            </ul>
        </nav>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar filme ou série...">
        </div>
    </header>

    <!-- Banner Principal -->
    <section class="hero" id="hero">
    <div class="hero-content">
        <span class="hero-tag">Em Destaque</span>
            <h1 class="hero-title">Round 6</h1>
<p class="hero-desc">Participantes endividados entram em jogos perigosos onde apenas um sairá vencedor.</p>
        <button class="btn-watch"
onclick="showTrailer('videos/round6.mp4')">
ASSISTIR AGORA
</button>
    </div>
</section>

    <!-- Área Principal -->
    <main>
        <!-- Seção de Resultados da Busca (Dinâmica) -->
        <section id="searchResultsSection" class="hidden">
            <div class="section-title">
                <span>Resultados da Busca</span>
                <span style="font-size: 1rem; color: var(--primary);" onclick="clearSearch()">Limpar x</span>
            </div>
            <div class="movies-grid" id="searchResultsGrid">
                <!-- Os cards serão inseridos aqui via JS -->
            </div>
        </section>

        <!-- Seção Padrão (Filmes/Séries) -->
        <section id="defaultContent">
            <div class="section-title">
                <span>Tendências</span>
            </div>
            <div class="movies-grid" id="mainGrid">
                <!-- Os cards serão inseridos aqui via JS -->
            </div>
        </section>
    </main>

    <!-- Rodapé -->

     <div id="trailerArea"></div>

    <footer>
        <div class="logo" style="font-size: 1.5rem;">Cine<span>Vibe</span></div>
        <p>&copy; 2023 CineVibe. Todos os direitos reservados. Design Gamer Moderno.</p>
    </footer>

     <footer>
    <div class="logo">CineVibe</div>
</footer>

<div id="movieModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeMovie()">×</span>
        <img id="modalImage" class="modal-img">
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
        <p id="modalInfo"></p>
        <button class="btn-watch" onclick="playModalTrailer()">Assistir Trailer</button>
        <div id="modalTrailer"></div>
    </div>
</div>

    <!-- Lógica JavaScript -->
    <script>
        // Banco de Dados "Mock" (Simulado)
       const moviesData = [
    {
       id: 1,
       title: "A Freira",
       desc: "Uma força maligna assombra um convento.",
       rating: 8.5,
       image: "imagem/freira.jpg",
       trailer: "videos/freira.mp4",
       category: "movie",
       type: "Terror"
    },
    {
        id: 3,
        title: "Bird Box",
        desc: "Uma força misteriosa leva as pessoas ao suicídio ao ser vista. Para sobreviver, é preciso manter os olhos vendados.",
        rating: 8.1,
        image: "imagem/birdbox.jpg",
        trailer: "videos/birdbox.mp4",
        category: "movie",
        type: "Suspense"
    
    },
    {
         id: 4,
        title: "The Silence",
        desc: "Uma família luta para sobreviver após criaturas mortais que caçam pelo som invadirem o mundo.",
        rating: 7.8,
        image: "imagem/thesilence.jpg",
        trailer: "videos/thesilence.mp4",
        category: "movie",
        type: "Terror"
    },
    {
        id: 5,
        title: "It: A Coisa",
        desc: "Um grupo de crianças enfrenta uma entidade maligna que assume a forma do palhaço Pennywise.",
        rating: 8.0,
        image: "imagem/itacoisa.jfif",
        trailer: "videos/it.mp4",
        category: "movie",
        type: "Terror"
    },
    {
         id: 6,
         title: "John Wick",
         desc: "Um ex-assassino de elite retorna ao mundo do crime em busca de vingança após uma tragédia pessoal.",
         rating: 8.9,
         image: "imagem/john wick.jpg",
         trailer: "videos/johnwick.mp4",
         category: "movie",
         type: "Ação"
    },
    {
        
         id: 7,
         title: "Avatar",
         desc: "Em Pandora, um ex-fuzileiro embarca em uma aventura épica entre humanos e os Navi.",
         rating: 9.1,
         image: "imagem/avatar.jpg",
         trailer: "videos/avatar.mp4",
         category: "movie",
         type: "Ficção Científica"
    },
];

        // Referências do DOM
        const searchInput = document.getElementById('searchInput');
        const mainGrid = document.getElementById('mainGrid');
        const searchResultsSection = document.getElementById('searchResultsSection');
        const searchResultsGrid = document.getElementById('searchResultsGrid');
        const defaultContent = document.getElementById('defaultContent');

        // Função para determinar a cor da nota e o texto
        function getRatingInfo(rating) {
            if (rating >= 8.0) return { class: 'good', text: 'Ótimo' };
            if (rating >= 6.0) return { class: 'avg', text: 'Bom' };
            return { class: 'bad', text: 'Ruim' };
        }

        // Função para criar o HTML do Card
        function createCard(movie) {
            const ratingInfo = getRatingInfo(movie.rating);
            return ` 
                 <div class="movie-card" onclick="openMovie('${movie.title}', '${movie.desc}', '${movie.image}', '${movie.trailer}', '${movie.type}', '${movie.rating}')">
                    <div class="card-image-wrapper">
                        <img src="${movie.image}" alt="${movie.title}" class="card-image">
                        <div class="rating-badge ${ratingInfo.class}">
                            ★ ${movie.rating} <span style="font-size: 0.7em; color: #fff;">(${ratingInfo.text})</span>
                        </div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${movie.title}</h3>
                        <p class="card-desc">${movie.desc}</p>
                        <div class="card-meta">
                            <span>${movie.type}</span>
                            <span>HD</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Renderizar filmes na tela inicial
        function renderMovies(filterCategory = 'all') {
            let filteredMovies = moviesData;
            
            if (filterCategory !== 'all') {
                filteredMovies = moviesData.filter(m => m.category === filterCategory);
                // Atualizar título da seção
                const title = document.querySelector('#defaultContent .section-title span');
                title.textContent = filterCategory === 'movie' ? 'Filmes' : 'Séries';
            } else {
                const title = document.querySelector('#defaultContent .section-title span');
                title.textContent = 'Tendências';
            }

            mainGrid.innerHTML = filteredMovies.map(createCard).join('');
        }

        // Lógica de Pesquisa
        searchInput.addEventListener('keyup', (e) => {
            const term = e.target.value.toLowerCase().trim();

            if (term.length > 0) {
                // Filtrar dados
                const results = moviesData.filter(movie => 
                    movie.title.toLowerCase().includes(term) || 
                    movie.desc.toLowerCase().includes(term)
                );

                // Mostrar seção de busca, esconder padrão
                defaultContent.classList.add('hidden');
                searchResultsSection.classList.remove('hidden');

                // Renderizar
                if (results.length > 0) {
                    searchResultsGrid.innerHTML = results.map(createCard).join('');
                } else {
                    searchResultsGrid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">
                            <h3>Nenhum resultado encontrado para "${term}"</h3>
                            <p>Tente pesquisar outro nome.</p>
                        </div>
                    `;
                }
            } else {
                // Se o campo estiver vazio, volta ao padrão
                clearSearch();
            }
        });

        // Limpar busca
        function clearSearch() {
            searchInput.value = '';
            searchResultsSection.classList.add('hidden');
            defaultContent.classList.remove('hidden');
        }

        // Filtrar por categoria (Menu)
        function filterCategory(category) {
            clearSearch();
            renderMovies(category);
            
            // Atualizar classe 'active' no menu
            const links = document.querySelectorAll('nav a');
            links.forEach(link => link.classList.remove('active'));
            event.target.classList.add('active');
        }

        function filterCategory(category) {
    clearSearch();
    renderMovies(category);

    const links = document.querySelectorAll('nav a');
    links.forEach(link => link.classList.remove('active'));
    event.target.classList.add('active');
}

// COLE AQUI
function showTrailer(url) {
    document.getElementById("trailerArea").innerHTML = `
        <iframe
            width="100%"
            height="500"
            src="${url}"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    `;

    document.getElementById("trailerArea").scrollIntoView({
        behavior: "smooth"
    });
}
// Inicializar
document.addEventListener('DOMContentLoaded', () => {
    renderMovies();
    document.getElementById("movieModal").style.display = "none";
    document.getElementById("modalTrailer").innerHTML = "";
});

let currentTrailer = "";

function openMovie(title, desc, image, trailer, type, rating) {
    currentTrailer = trailer;

    document.getElementById("movieModal").style.display = "block";
    document.getElementById("modalImage").src = image;
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalDesc").innerText = desc;
    document.getElementById("modalInfo").innerText = `${type} • Nota ${rating}`;
    document.getElementById("modalTrailer").innerHTML = "";
}

function closeMovie() {
    document.getElementById("movieModal").style.display = "none";
    document.getElementById("modalTrailer").innerHTML = "";
}

function playModalTrailer() {
    document.getElementById("modalTrailer").innerHTML = `
        <video width="100%" height="400" controls>
            <source src="${currentTrailer}" type="video/mp4">
        </video>
    `;
}
    document.getElementById("movieModal").style.display = "block";
    document.getElementById("modalImage").src = image;
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalDesc").innerText = desc;
    document.getElementById("modalInfo").innerText = `${type} • Nota ${rating}`;


function closeMovie() {
    document.getElementById("movieModal").style.display = "none";
    document.getElementById("modalTrailer").innerHTML = "";
}



    </script>
</body>
</html>
